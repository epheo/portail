apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: portail
  namespace: portail-system
  labels:
    app: portail
spec:
  selector:
    matchLabels:
      app: portail
  template:
    metadata:
      labels:
        app: portail
    spec:
      serviceAccountName: portail-controller
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: portail
        image: ghcr.io/epheo/portail:latest
        imagePullPolicy: Always
        args: ["--kubernetes"]
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
            # Bind privileged node ports (80/443) directly. The image carries
            # cap_net_bind_service as a file capability; this add puts it in the
            # pod's bounding set so portail can raise it to effective. No sysctl,
            # no root, no allowPrivilegeEscalation.
            add: [NET_BIND_SERVICE]
          seccompProfile:
            type: RuntimeDefault
