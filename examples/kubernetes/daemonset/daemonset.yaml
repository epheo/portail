apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: portail
  namespace: portail-system
  labels:
    app: portail
spec:
  selector:
    matchLabels:
      app: portail
  template:
    metadata:
      labels:
        app: portail
    spec:
      serviceAccountName: portail-controller
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        sysctls:
        - name: net.ipv4.ip_unprivileged_port_start
          value: "0"
      containers:
      - name: portail
        image: ghcr.io/epheo/portail:latest
        imagePullPolicy: Always
        args: ["--kubernetes"]
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
