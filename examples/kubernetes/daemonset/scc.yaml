apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: portail
  annotations:
    kubernetes.io/description: >-
      SCC for the Portail gateway controller DaemonSet. Allows host network
      and host ports for ingress routing, plus NET_BIND_SERVICE for privileged
      port binding. All other privileges are denied.
allowHostNetwork: true
allowHostPorts: true
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostPID: false
allowPrivilegedContainer: false
allowPrivilegeEscalation: false
defaultAddCapabilities: null
requiredDropCapabilities:
  - ALL
allowedCapabilities:
  - NET_BIND_SERVICE
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
fsGroup:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
seccompProfiles:
  - runtime/default
volumes:
  - secret
  - configMap
  - downwardAPI
  - projected
users:
  - system:serviceaccount:portail-system:portail-controller
