# Route HTTP traffic from frontend UDN to backend UDN.
# Pods on udn-frontend can reach backend-service (on udn-backend)
# by connecting to portail's frontend address (gw-frontend).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-to-backend
spec:
  parentRefs:
  - name: gw-frontend
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: backend-service
      port: 8080
