# Route HTTP traffic from frontend UDN to backend UDN
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-to-backend
spec:
  parentRefs:
  - name: gw-frontend
  hostnames:
  - api.internal
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: backend-service  # Service on udn-backend
      port: 8080
