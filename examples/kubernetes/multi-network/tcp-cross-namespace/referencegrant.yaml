# Allows TCPRoutes in portail-system to reference Services in tenant-backend.
# Without this, cross-namespace backendRefs are rejected by the Gateway API spec.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-portail-routes
  namespace: tenant-backend
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: TCPRoute
    namespace: portail-system
  to:
  - group: ""
    kind: Service
