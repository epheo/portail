# Test backend: PostgreSQL on the backend network in a separate namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: tenant-backend
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        k8s.v1.cni.cncf.io/networks: vpc-backend
    spec:
      containers:
      - name: postgres
        image: docker.io/library/postgres:17-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          value: example
        - name: PGDATA
          value: /tmp/pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: tenant-backend
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
