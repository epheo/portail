apiVersion: apps/v1
kind: Deployment
metadata:
  name: portail
  namespace: portail-system
  labels:
    app: portail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portail
  template:
    metadata:
      labels:
        app: portail
      annotations:
        k8s.v1.cni.cncf.io/networks: vpc-frontend, vpc-backend
    spec:
      serviceAccountName: portail-controller
      containers:
      - name: portail
        image: ghcr.io/epheo/portail:latest
        args: ["--kubernetes"]
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
            # Multi-network mode binds the published port on each network IP
            # directly (no fronting Service). The image's cap_net_bind_service
            # file capability + this add let portail bind it — non-root, no sysctl.
            add: [NET_BIND_SERVICE]
          seccompProfile:
            type: RuntimeDefault
