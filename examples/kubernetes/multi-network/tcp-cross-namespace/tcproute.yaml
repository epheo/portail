# Route PostgreSQL traffic from the frontend network to the backend namespace.
# The ReferenceGrant in tenant-backend authorizes this cross-namespace reference.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: frontend-to-postgres
  namespace: portail-system
spec:
  parentRefs:
  - name: gw-frontend
    sectionName: tcp-postgres
  rules:
  - backendRefs:
    - name: postgres
      namespace: tenant-backend
      port: 5432
