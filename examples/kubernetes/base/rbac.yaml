apiVersion: v1
kind: ServiceAccount
metadata:
  name: portail-controller
  namespace: portail-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: portail-controller
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses
      - gateways
      - httproutes
      - tcproutes
      - tlsroutes
      - udproutes
      - referencegrants
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses/status
      - gateways/status
      - httproutes/status
      - tcproutes/status
      - tlsroutes/status
      - udproutes/status
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["namespaces", "secrets", "services"]
    verbs: ["get", "list", "watch"]
  # get/list only (NO watch): a one-shot, label-filtered read to resolve a
  # headless Service's named targetPort to its numeric value. Not a watch —
  # backend pod churn is tracked via DNS (STRICT_DNS), not EndpointSlices.
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portail-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: portail-controller
subjects:
  - kind: ServiceAccount
    name: portail-controller
    namespace: portail-system
