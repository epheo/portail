apiVersion: apps/v1
kind: Deployment
metadata:
  name: portail
  namespace: portail-system
  labels:
    app: portail
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portail
  template:
    metadata:
      labels:
        app: portail
    spec:
      serviceAccountName: portail-controller
      containers:
      - name: portail
        image: ghcr.io/epheo/portail:latest
        args: ["--kubernetes"]
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
            # This static manifest binds 80/443 directly (no operator to remap to
            # an unprivileged targetPort). The image's cap_net_bind_service file
            # capability + this add let portail bind them — non-root, no sysctl.
            # Under the operator, service-mode pods bind an unprivileged target
            # port and need no capability at all.
            add: [NET_BIND_SERVICE]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
