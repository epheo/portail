apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gw
spec:
  gatewayClassName: portail
  addresses:
  - type: IPAddress
    value: "203.0.113.10"  # Replace with your LoadBalancer VIP
  listeners:
  - name: http
    port: 80
    protocol: HTTP
  - name: https
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - name: example-cert
