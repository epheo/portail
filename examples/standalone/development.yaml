gateway:
  name: development-gateway
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
    address: 127.0.0.1
    interface: lo
  - name: https
    protocol: HTTPS
    port: 8443
    address: 127.0.0.1
    interface: lo
    tls:
      mode: Terminate
      certificateRefs:
      - name: example-cert
  - name: tcp-ssh
    protocol: TCP
    port: 2222
    address: 127.0.0.1
    interface: lo
httpRoutes:
- parentRefs:
  - name: development-gateway
    sectionName: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-service
      port: 3001
- parentRefs:
  - name: development-gateway
    sectionName: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /index.html
    backendRefs:
    - name: frontend-service-1
      port: 3001
    - name: frontend-service-2
      port: 3002
    - name: frontend-service-3
      port: 3003
- parentRefs:
  - name: development-gateway
    sectionName: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api.json
    backendRefs:
    - name: api-service
      port: 3001
- parentRefs:
  - name: development-gateway
    sectionName: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /users.json
    backendRefs:
    - name: users-service
      port: 3002
- parentRefs:
  - name: development-gateway
    sectionName: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /dataset.json
    backendRefs:
    - name: dataset-service
      port: 3003
- parentRefs:
  - name: development-gateway
    sectionName: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /health
    backendRefs:
    - name: api-service
      port: 3001
- parentRefs:
  - name: development-gateway
    sectionName: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /v2
    backendRefs:
    - name: api-service
      port: 3001
- parentRefs:
  - name: development-gateway
    sectionName: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /mirrored
    filters:
    - type: RequestMirror
      requestMirror:
        backendRef:
          name: 127.0.0.1
          port: 9999
    backendRefs:
    - name: api-service
      port: 3001
tcpRoutes:
- parentRefs:
  - name: development-gateway
    sectionName: tcp-ssh
  rules:
  - backendRefs:
    - name: ssh-service
      port: 22
udpRoutes: []
observability:
  logging:
    level: debug
    format: pretty
    output: stdout
performance:
  backendTimeout: 30s
  udpSessionTimeout: 30s
