gateway:
  name: development-gateway
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
    address: 127.0.0.1
    interface: lo
  - name: tcp-ssh
    protocol: TCP
    port: 2222
    address: 127.0.0.1
    interface: lo
  workers:
  - id: 0
    protocols:
    - http1
    - http2
    buffer_size: 8KB
    buffer_count: 64
    tcp_nodelay: false
    tcp_keepalive: false
    tcp_keepalive_idle: 2h
    tcp_keepalive_interval: 1m
    tcp_keepalive_probes: 9
  - id: 1
    protocols:
    - http1
    - http2
    buffer_size: 8KB
    buffer_count: 64
    tcp_nodelay: false
    tcp_keepalive: false
    tcp_keepalive_idle: 2h
    tcp_keepalive_interval: 1m
    tcp_keepalive_probes: 9
  - id: 2
    protocols:
    - tcp
    buffer_size: 64KB
    buffer_count: 16
    tcp_nodelay: true
    tcp_keepalive: true
    tcp_keepalive_idle: 10m
    tcp_keepalive_interval: 1m
    tcp_keepalive_probes: 5
  - id: 3
    protocols:
    - tcp
    buffer_size: 64KB
    buffer_count: 16
    tcp_nodelay: true
    tcp_keepalive: true
    tcp_keepalive_idle: 10m
    tcp_keepalive_interval: 1m
    tcp_keepalive_probes: 5
  worker_threads: 4
  api_port: 8081
  api_enabled: true
  io_uring_queue_depth: 256
  connection_pool_size: 64
  buffer_pool_size: 64MB
  network_interface: eth0
http_routes:
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backend_refs:
    - name: frontend-service
      port: 3001
      weight: 1
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /index.html
    backend_refs:
    - name: frontend-service-1
      port: 3001
      weight: 1
    - name: frontend-service-2
      port: 3002
      weight: 1
    - name: frontend-service-3
      port: 3003
      weight: 1
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api.json
    backend_refs:
    - name: api-service
      port: 3001
      weight: 1
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /users.json
    backend_refs:
    - name: users-service
      port: 3002
      weight: 1
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /dataset.json
    backend_refs:
    - name: dataset-service
      port: 3003
      weight: 1
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /health
    backend_refs:
    - name: api-service
      port: 3001
      weight: 1
tcp_routes:
- parent_refs:
  - name: development-gateway
    section_name: tcp-ssh
  rules:
  - backend_refs:
    - name: ssh-service
      port: 22
      weight: 1
observability:
  logging:
    level: debug
    format: compact
    output: !file "/var/log/uringress/uringress.log"
  metrics:
    enabled: true
    port: 9091
    path: /metrics
  health_check:
    enabled: true
    interval: 15s
    timeout: 10s
    failure_threshold: 5
    success_threshold: 2
performance:
  backend_response_timeout: 30s
  connection_pool_size: 64
  max_requests_per_connection: 100
  standard_buffer_size: 8KB
  large_buffer_size: 16KB
  header_buffer_size: 4KB
  connection_max_age: 5m
  circuit_breaker_timeout: 15s
  keep_alive_timeout: 10s
  circuit_breaker_failure_threshold: 5
  max_retries: 3
  tcp_nodelay: true
  so_reuseport: true
  cpu_affinity: null
