gateway:
  name: development-gateway
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
    address: 127.0.0.1
    interface: lo
  - name: tcp-ssh
    protocol: TCP
    port: 2222
    address: 127.0.0.1
    interface: lo
  workers:
  - id: 0
    buffer_size: 16KB
    buffer_count: 256
    tcp_nodelay: true
  - id: 1
    buffer_size: 16KB
    buffer_count: 256
    tcp_nodelay: true
  - id: 2
    buffer_size: 16KB
    buffer_count: 256
    tcp_nodelay: true
  - id: 3
    buffer_size: 16KB
    buffer_count: 256
    tcp_nodelay: true
  worker_threads: 4
http_routes:
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backend_refs:
    - name: frontend-service
      port: 3001
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /index.html
    backend_refs:
    - name: frontend-service-1
      port: 3001
    - name: frontend-service-2
      port: 3002
    - name: frontend-service-3
      port: 3003
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api.json
    backend_refs:
    - name: api-service
      port: 3001
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /users.json
    backend_refs:
    - name: users-service
      port: 3002
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /dataset.json
    backend_refs:
    - name: dataset-service
      port: 3003
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /health
    backend_refs:
    - name: api-service
      port: 3001
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1
    filters:
    - type: URLRewrite
      path:
        type: ReplacePrefixMatch
        value: /v2
    backend_refs:
    - name: api-service
      port: 3001
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /mirrored
    filters:
    - type: RequestMirror
      backend_ref:
        name: 127.0.0.1
        port: 9999
    backend_refs:
    - name: api-service
      port: 3001
tcp_routes:
- parent_refs:
  - name: development-gateway
    section_name: tcp-ssh
  rules:
  - backend_refs:
    - name: ssh-service
      port: 2242
udp_routes: []
observability:
  logging:
    level: debug
    format: pretty
    output: stdout
performance:
  keep_alive_timeout: 10s
  backend_timeout: 30s
  udp_session_timeout: 30s
