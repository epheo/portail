gateway:
  name: development-gateway
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
    address: 127.0.0.1
    interface: lo
  - name: tcp-ssh
    protocol: TCP
    port: 2222
    address: 127.0.0.1
    interface: lo
  workers:
  - id: 0
    buffer_size: 16KB
    buffer_count: 256
    tcp_nodelay: true
  - id: 1
    buffer_size: 16KB
    buffer_count: 256
    tcp_nodelay: true
  - id: 2
    buffer_size: 16KB
    buffer_count: 256
    tcp_nodelay: true
  - id: 3
    buffer_size: 16KB
    buffer_count: 256
    tcp_nodelay: true
  worker_threads: 4
http_routes:
- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backend_refs:
    - name: 127.0.0.1
      port: 3001

- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /index.html
    backend_refs:
    - name: 127.0.0.1
      port: 3001

    - name: 127.0.0.1
      port: 3002

    - name: 127.0.0.1
      port: 3003

- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api.json
    backend_refs:
    - name: 127.0.0.1
      port: 3001

- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /users.json
    backend_refs:
    - name: 127.0.0.1
      port: 3002

- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /dataset.json
    backend_refs:
    - name: 127.0.0.1
      port: 3003

- parent_refs:
  - name: development-gateway
    section_name: http
  hostnames:
  - localhost
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /health
    backend_refs:
    - name: 127.0.0.1
      port: 3001

tcp_routes:
- parent_refs:
  - name: development-gateway
    section_name: tcp-ssh
  rules:
  - backend_refs:
    - name: 127.0.0.1
      port: 2242

observability:
  logging:
    level: debug
    format: pretty
    output: stdout
performance:
  keep_alive_timeout: 10s
