gateway:
  name: microservices-gateway
  listeners:
  - name: http-8080
    protocol: HTTP
    port: 8080
  - name: tcp-5432
    protocol: TCP
    port: 5432
  - name: tcp-6379
    protocol: TCP
    port: 6379
  - name: tcp-3306
    protocol: TCP
    port: 3306
  - name: tcp-27017
    protocol: TCP
    port: 27017
  worker_threads: 8
  api_port: 8081
  api_enabled: true
  io_uring_queue_depth: 512
  connection_pool_size: 128
  buffer_pool_size: 128MB
http_routes:
- parent_refs:
  - name: microservices-gateway
    section_name: http-8080
    port: 8080
  hostnames:
  - api.microservices.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /auth
    backend_refs:
    - name: auth-service
      port: 8001
      weight: 100
  - matches:
    - path:
        type: PathPrefix
        value: /users
    backend_refs:
    - name: user-service
      port: 8002
      weight: 100
  - matches:
    - path:
        type: PathPrefix
        value: /orders
    backend_refs:
    - name: order-service
      port: 8003
      weight: 100
  - matches:
    - path:
        type: PathPrefix
        value: /payments
    backend_refs:
    - name: payment-service
      port: 8004
      weight: 100
- parent_refs:
  - name: microservices-gateway
    section_name: http-8080
    port: 8080
  hostnames:
  - admin.microservices.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backend_refs:
    - name: admin-dashboard
      port: 3000
      weight: 100
tcp_routes:
- parent_refs:
  - name: microservices-gateway
    section_name: tcp-5432
    port: 5432
  rules:
  - backend_refs:
    - name: postgres-primary
      port: 5432
      weight: 50
    - name: postgres-replica-1
      port: 5432
      weight: 25
    - name: postgres-replica-2
      port: 5432
      weight: 25
- parent_refs:
  - name: microservices-gateway
    section_name: tcp-6379
    port: 6379
  rules:
  - backend_refs:
    - name: redis-cluster-1
      port: 6379
      weight: 33
    - name: redis-cluster-2
      port: 6379
      weight: 33
    - name: redis-cluster-3
      port: 6379
      weight: 34
- parent_refs:
  - name: microservices-gateway
    section_name: tcp-3306
    port: 3306
  rules:
  - backend_refs:
    - name: mysql-primary
      port: 3306
      weight: 70
    - name: mysql-replica
      port: 3306
      weight: 30
- parent_refs:
  - name: microservices-gateway
    section_name: tcp-27017
    port: 27017
  rules:
  - backend_refs:
    - name: mongodb-shard-1
      port: 27017
      weight: 33
    - name: mongodb-shard-2
      port: 27017
      weight: 33
    - name: mongodb-shard-3
      port: 27017
      weight: 34
observability:
  logging:
    level: info
    format: json
    output: stdout
  metrics:
    enabled: true
    port: 9090
    path: /metrics
  health_check:
    enabled: true
    interval: 15s
    timeout: 5s
    failure_threshold: 3
    success_threshold: 2
performance:
  backend_response_timeout: 10s
  connection_pool_size: 128
  max_requests_per_connection: 200
  standard_buffer_size: 8KB
  large_buffer_size: 16KB
  header_buffer_size: 4KB
  connection_max_age: 5m
  circuit_breaker_timeout: 10s
  keep_alive_timeout: 5s
  circuit_breaker_failure_threshold: 5
  max_retries: 2
  tcp_nodelay: true
  so_reuseport: true
  cpu_affinity:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
