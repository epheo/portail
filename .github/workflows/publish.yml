name: Release

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    name: CI
    uses: ./.github/workflows/ci.yml

  conformance:
    name: Gateway API Conformance
    uses: ./.github/workflows/conformance.yml

  release:
    name: Release
    needs: [check, conformance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*.*.*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.3"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          BARE="${NEXT#v}"
          MINOR="${BARE%.*}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "version_bare=$BARE" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "Next release: $NEXT (bare: $BARE, minor: $MINOR)"

      # Keep the in-tree versions matching the tag so `portail --version` and
      # the conformance report agree with the published image. The bump commit
      # is what gets tagged and built; GITHUB_TOKEN pushes do not retrigger
      # workflows, so this cannot loop.
      - name: Sync versions with tag
        run: |
          BARE="${{ steps.version.outputs.version_bare }}"
          NEXT="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${BARE}\"/" Cargo.toml
          sed -i "/^name = \"portail\"$/{n;s/^version = \".*\"/version = \"${BARE}\"/}" Cargo.lock
          sed -i "s/\(portailVersion *= *\)\"v[^\"]*\"/\1\"${NEXT}\"/" conformance/conformance_test.go
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock conformance/conformance_test.go
            git commit -m "Release ${NEXT}"
            git push origin main
          fi

      - name: Create tag and GitHub Release
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
          gh release create ${{ steps.version.outputs.version }} \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version_bare }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
