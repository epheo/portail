name: Bench

# ADVISORY micro-benchmark tracking — this workflow never blocks a PR.
#
# Shared GitHub runners cannot gate perf: a docs-only PR measured a uniform
# 1.5-1.6x on every suite purely from baseline-vs-PR runner hardware. The
# enforcing gate runs locally on owned hardware with a strict threshold:
#   make bench-baseline   # once per machine
#   make bench-check      # fails past 1.15x the local baseline
# (Moving CI itself to owned runners may re-enable blocking here later.)
#
# The real-socket throughput bench (benches/proxy_throughput.rs) is likewise
# local-only: it spawns processes, needs the `kiss` backend, and its req/s
# figure means nothing on borrowed hardware:
#   cargo build --release && cargo bench --bench proxy_throughput

on:
  push:
    branches: [ main ]        # refresh the stored baseline
  pull_request:
    branches: [ main ]        # compare against it; alert on regression

permissions:
  contents: write             # github-action-benchmark pushes history to gh-pages
  pull-requests: write        # and comments on a regressing PR

env:
  CARGO_TERM_COLOR: always

jobs:
  micro-bench:
    name: Micro-benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # criterion's `--output-format bencher` emits libtest-style lines
      # (`test <name> ... bench: <ns> ns/iter (+/- <mad>)`), which
      # github-action-benchmark parses with `tool: cargo`.
      - name: Run criterion micro-benches
        run: |
          cargo bench --bench parsing_bench --bench routing_bench --bench end_to_end_bench \
            -- --output-format bencher | tee bench-output.txt

      - name: Track results + alert on regression
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # On push to main: store the new baseline. On PRs: compare only.
          auto-push: ${{ github.event_name == 'push' }}
          save-data-file: ${{ github.event_name == 'push' }}
          # Alert comments only — cross-runner variance makes any threshold
          # here noise-bound; the enforcing gate is `make bench-check`.
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          summary-always: true
