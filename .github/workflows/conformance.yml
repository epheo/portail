name: Conformance

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  conformance:
    name: Gateway API Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5

      # The operator provisions the per-Gateway data planes the suite exercises.
      # Checked out beside the portail repo; OPERATOR_DIR points the harness at it.
      # NOTE: tracks the operator's main; keep operator + portail conformance
      # changes released together (cross-repo coupling).
      - name: Checkout portail-operator
        uses: actions/checkout@v5
        with:
          repository: epheo/portail-operator
          ref: main
          path: portail-operator

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: conformance/go.sum

      - name: Run conformance tests
        working-directory: conformance
        env:
          OPERATOR_DIR: ${{ github.workspace }}/portail-operator
        run: go test -v -timeout 45m -run TestConformance -count=1

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: conformance-report
          path: |
            conformance/reports/
