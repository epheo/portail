apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: uringress
allowHostNetwork: true
allowHostPorts: true
allowPrivilegedContainer: false
allowHostDirVolumePlugin: true
allowedCapabilities:
  - BPF
  - NET_ADMIN
  - NET_BIND_SERVICE
  - SYS_ADMIN
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - hostPath
  - secret
  - configMap
users:
  - system:serviceaccount:uringress-system:uringress-controller
