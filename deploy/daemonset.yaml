apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: portail
  namespace: portail-system
  labels:
    app: portail
spec:
  selector:
    matchLabels:
      app: portail
  template:
    metadata:
      labels:
        app: portail
    spec:
      serviceAccountName: portail-controller
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: portail
          image: portail:latest
          args: ["--kubernetes"]
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/portail/certs
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: portail-tls
            optional: true
