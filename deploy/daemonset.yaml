apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: uringress
  namespace: uringress-system
  labels:
    app: uringress
spec:
  selector:
    matchLabels:
      app: uringress
  template:
    metadata:
      labels:
        app: uringress
    spec:
      serviceAccountName: uringress-controller
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: uringress
          image: uringress:latest
          args: ["--kubernetes"]
          securityContext:
            capabilities:
              add:
                - BPF
                - NET_ADMIN
                - NET_BIND_SERVICE
                - SYS_ADMIN
          volumeMounts:
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: tls-certs
              mountPath: /etc/uringress/certs
              readOnly: true
      volumes:
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: tls-certs
          secret:
            secretName: uringress-tls
            optional: true
